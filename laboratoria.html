<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Matemático: Batalla del Jefe</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: #2b2b2b;
            border: 4px solid #d4af37; /* Borde dorado tipo RPG */
            border-radius: 10px;
            padding: 20px;
            width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        h1 {
            color: #d4af37;
            margin-top: 0;
        }
        .arena {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #000;
            border: 2px solid #555;
            border-radius: 5px;
        }
        .character {
            width: 45%;
        }
        .hp-bar {
            width: 100%;
            height: 20px;
            background-color: #555;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        .hp-fill {
            height: 100%;
            transition: width 0.3s;
        }
        #player-hp-fill { background-color: #2ecc71; width: 100%; }
        #boss-hp-fill { background-color: #e74c3c; width: 100%; }
        
        .equation-box {
            font-size: 24px;
            font-weight: bold;
            background-color: #fff;
            color: #000;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            letter-spacing: 2px;
        }
        .controls {
            margin-bottom: 20px;
        }
        input[type="number"] {
            font-size: 18px;
            padding: 5px;
            width: 80px;
            text-align: center;
            font-family: inherit;
        }
        button {
            font-size: 18px;
            padding: 5px 15px;
            background-color: #d4af37;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: #f1c40f;
        }
        #log {
            height: 80px;
            background-color: #000;
            border: 2px solid #555;
            padding: 10px;
            text-align: left;
            overflow-y: auto;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
<audio id="bg-music" src="Doom OST - E1M1 - At Doom's Gate.mp3" loop></audio>
    <div id="game-container">
        <h1>🗡️ RPG Matemático 🛡️</h1>
        
        <div class="arena">
            <div class="character">
                <strong>Héroe</strong>
                <div>HP: <span id="player-hp-text">100</span>/100</div>
                <div class="hp-bar"><div id="player-hp-fill"></div></div>
            </div>
            <div class="character">
                <strong>Rey Demonio</strong>
                <div>HP: <span id="boss-hp-text">100</span>/100</div>
                <div class="hp-bar"><div id="boss-hp-fill"></div></div>
            </div>
        </div>

        <div id="dialogue">¡Resuelve la ecuación para lanzar tu hechizo!</div>
        <div class="equation-box" id="equation-display">Cargando...</div>

        <div class="controls">
            <label style="font-size: 20px;">x = </label>
            <input type="number" id="answer-input" placeholder="?" autocomplete="off">
            <button onclick="attack()" id="attack-btn">Atacar</button>
        </div>

        <div id="log">
            * Un Rey Demonio salvaje ha aparecido.<br>
            * ¡Prepárate para la batalla!<br>
        </div>
    </div>

    <script>
        // Variables del juego
        let playerHP = 100;
        let bossHP = 100;
        let currentX = 0;
        let isGameOver = false;

        // Elementos del DOM
        const equationDisplay = document.getElementById('equation-display');
        const answerInput = document.getElementById('answer-input');
        const playerHpText = document.getElementById('player-hp-text');
        const bossHpText = document.getElementById('boss-hp-text');
        const playerHpFill = document.getElementById('player-hp-fill');
        const bossHpFill = document.getElementById('boss-hp-fill');
        const logDisplay = document.getElementById('log');
        const attackBtn = document.getElementById('attack-btn');

        // Función para agregar mensajes al registro de batalla
        function addLog(message, color = "#ccc") {
            logDisplay.innerHTML += `<span style="color:${color}">${message}</span><br>`;
            logDisplay.scrollTop = logDisplay.scrollHeight;
        }

        // Generar una ecuación de primer grado aleatoria (ax + b = c o ax - b = c)
        function generateEquation() {
            if (isGameOver) return;
            
            // Generar números aleatorios asegurando que 'x' sea entero
            let a = Math.floor(Math.random() * 9) + 2; // a entre 2 y 10
            currentX = Math.floor(Math.random() * 20) - 5; // x entre -5 y 15
            let b = Math.floor(Math.random() * 20) + 1; // b entre 1 y 20
            
            let isAddition = Math.random() > 0.5;
            let c = isAddition ? (a * currentX) + b : (a * currentX) - b;
            
            let operator = isAddition ? "+" : "-";
            equationDisplay.textContent = `${a}x ${operator} ${b} = ${c}`;
            answerInput.value = '';
            answerInput.focus();
        }

        // Lógica de ataque
        function attack() {
            if (isGameOver) {
                resetGame();
                return;
            }

            const playerAnswer = parseInt(answerInput.value);

            if (isNaN(playerAnswer)) {
                addLog("⚠️ El sistema falló: Debes ingresar un número.", "#f39c12");
                return;
            }

            if (playerAnswer === currentX) {
                // Respuesta correcta: El jugador ataca
                const damage = Math.floor(Math.random() * 15) + 20; // Daño entre 20 y 34
                bossHP -= damage;
                if (bossHP < 0) bossHP = 0;
                
                addLog(`⚔️ ¡Correcto! Lanzaste un ataque que infligió ${damage} de daño.`, "#2ecc71");
            } else {
                // Respuesta incorrecta: El jefe ataca
                const damage = Math.floor(Math.random() * 10) + 15; // Daño entre 15 y 24
                playerHP -= damage;
                if (playerHP < 0) playerHP = 0;
                
                addLog(`💥 ¡Incorrecto! La respuesta era ${currentX}. El jefe te ataca por ${damage} de daño.`, "#e74c3c");
            }

            updateUI();
            checkGameState();
        }

        // Actualizar barras de vida
        function updateUI() {
            playerHpText.textContent = playerHP;
            bossHpText.textContent = bossHP;
            playerHpFill.style.width = playerHP + "%";
            bossHpFill.style.width = bossHP + "%";
        }

        // Verificar si alguien ganó
        function checkGameState() {
            if (bossHP === 0) {
                addLog("🏆 ¡HAS DERROTADO AL REY DEMONIO! El reino está a salvo.", "#f1c40f");
                endGame();
            } else if (playerHP === 0) {
                addLog("💀 Has sido derrotado... El reino cae en la oscuridad.", "#c0392b");
                endGame();
            } else {
                generateEquation(); // Generar la siguiente ecuación
            }
        }

        function endGame() {
            isGameOver = true;
            equationDisplay.textContent = "FIN DE LA BATALLA";
            answerInput.disabled = true;
            attackBtn.textContent = "Jugar de nuevo";
        }

        function resetGame() {
            playerHP = 100;
            bossHP = 100;
            isGameOver = false;
            answerInput.disabled = false;
            attackBtn.textContent = "Atacar";
            logDisplay.innerHTML = "* Un nuevo desafío aparece...<br>";
            updateUI();
            generateEquation();
        }

        // Permitir atacar presionando 'Enter'
        answerInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                attackBtn.click();
            }
        });

        // Iniciar el juego
        generateEquation();
    </script>
</body>
</html>
